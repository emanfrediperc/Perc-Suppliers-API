name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Unit + e2e (Mongo rs0)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      MONGODB_URI: mongodb://localhost:27017/perc-suppliers-test?replicaSet=rs0&directConnection=true
      JWT_SECRET: ci-jwt-secret-at-least-32-characters-for-testing-only
      ENABLE_MAGIC_LINK: 'true'
      MAGIC_LINK_BASE_URL: http://localhost:4200/aprobar
      MAGIC_LINK_TTL_HOURS: '48'
      # No SMTP / no Resend — EmailService falls back to mock; e2e overrides
      # the EmailService provider to capture magic-link tokens anyway.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: 'npm'

      - name: Start MongoDB with replica set
        run: |
          # GitHub Actions' `services:` block can't pass --replSet to the
          # container command, so start Mongo manually. Without a keyfile
          # (not needed on a disposable test DB), rs0 can be initiated
          # right away.
          docker run -d --name mongo \
            -p 27017:27017 \
            mongo:7 --replSet rs0 --bind_ip_all

          # Wait for mongod to accept connections
          echo "Waiting for mongod..."
          until docker exec mongo mongosh --quiet --eval "db.runCommand({ping:1}).ok" >/dev/null 2>&1; do
            sleep 1
          done

          # Initiate the replica set
          docker exec mongo mongosh --quiet --eval '
            rs.initiate({
              _id: "rs0",
              members: [{ _id: 0, host: "localhost:27017" }]
            })
          '

          # Wait until the node reaches PRIMARY — required before transactions
          echo "Waiting for PRIMARY..."
          until docker exec mongo mongosh --quiet --eval 'rs.status().members[0].stateStr' 2>/dev/null | grep -q PRIMARY; do
            sleep 1
          done
          echo "MongoDB rs0 is ready."

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --ci

      - name: Seed test database
        run: npm run seed
        env:
          SEED_PASSWORD: admin123
          ALLOW_SEED: '1'

      - name: Run e2e tests
        run: npm run test:e2e -- --runInBand
        env:
          NODE_ENV: test

      - name: Dump MongoDB logs on failure
        if: failure()
        run: docker logs mongo --tail 200 || true
